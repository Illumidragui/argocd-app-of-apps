argocd-apps:
  applications:

    cert-manager-clusterissuer:
      namespace: argo-cd
      project: default
      source:
        repoURL: https://github.com/Illumidragui/devsecops-helm.git
        targetRevision: HEAD
        path: cert-manager-clusterissuer
      destination:
        server: https://kubernetes.default.svc
        namespace: cert-manager
      syncPolicy:
        automated:
          prune: true
          selfHeal: true

    ingress-nginx:
      namespace: argo-cd
      project: default
      source:
        repoURL: https://github.com/Illumidragui/devsecops-helm.git
        targetRevision: HEAD
        path: ingress-nginx
      destination:
        server: https://kubernetes.default.svc
        namespace: ingress-nginx
      syncPolicy:
        automated:
          prune: true
          selfHeal: true

    tailscale-operator:
      namespace: argo-cd
      project: default
      source:
        repoURL: https://github.com/Illumidragui/devsecops-helm.git
        targetRevision: HEAD
        path: tailscale-operator
      destination:
        server: https://kubernetes.default.svc
        namespace: tailscale-operator
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true

    syesite:
      namespace: argo-cd
      project: default
      source:
        repoURL: https://github.com/Illumidragui/devsecops-helm.git
        targetRevision: HEAD
        path: syesite-chart
      destination:
        server: https://kubernetes.default.svc
        namespace: syesite
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true